components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    YachtType:
      type: string
      enum:
        - motor_yacht
        - sailing_yacht
        - catamaran
        - superyacht
    YachtCondition:
      type: string
      enum:
        - New
        - Excellent
        - Good
        - Fair
        - Needs Refit
        - Project
    ValuationMode:
      type: string
      enum: [builder, specs]
    SaleRegion:
      type: string
      enum:
        - mediterranean
        - northern_europe
        - north_america_caribbean
        - asia_pacific_me
        - global
    VatStatus:
      type: string
      enum: [paid, not_paid]
    EngineConfig:
      type: string
      enum:
        - single_diesel
        - twin_diesel
        - triple_diesel
        - quad_diesel
        - ips_drives
        - sail_auxiliary
        - electric_hybrid
        - waterjet
    ValuationInput:
      type: object
      required:
        - mode
        - bypass_required
        - type
        - year_built
        - length_meters
        - sale_region
      properties:
        yacht_id:
          type: ["string", "null"]
          description: Optional link to a yacht profile (uuid). When set, the estimate appears in that yacht's History tab.
        mode:
          $ref: "#/components/schemas/ValuationMode"
        bypass_required:
          type: boolean
          description: When true, only hard requirements are enforced
        type:
          $ref: "#/components/schemas/YachtType"
        configuration:
          type: ["string", "null"]
          description: e.g. "Flybridge", "Sport Yacht", "Sloop"
        builder:
          type: ["string", "null"]
          description: Yacht builder/manufacturer (required when mode=builder unless bypass)
        model:
          type: ["string", "null"]
          description: Model/range (required when mode=builder unless bypass)
        year_built:
          type: integer
          minimum: 1940
          maximum: 2100
        refit_year:
          type: ["integer", "null"]
          minimum: 1940
          maximum: 2100
        condition:
          oneOf:
            - $ref: "#/components/schemas/YachtCondition"
            - type: "null"
          description: Required unless bypass; defaults to Excellent multiplier when missing
        sale_region:
          $ref: "#/components/schemas/SaleRegion"
        vat_status:
          oneOf:
            - $ref: "#/components/schemas/VatStatus"
            - type: "null"
          description: Required when sale_region in [mediterranean, northern_europe, global]
        length_meters:
          type: number
          minimum: 1
          maximum: 200
        beam_meters:
          type: ["number", "null"]
        draft_meters:
          type: ["number", "null"]
        hull_material:
          type: ["string", "null"]
        displacement_tonnes:
          type: ["number", "null"]
        gross_tonnage:
          type: ["number", "null"]
        engine_maker:
          type: ["string", "null"]
        engine_model:
          type: ["string", "null"]
        engine_config:
          oneOf:
            - $ref: "#/components/schemas/EngineConfig"
            - type: "null"
        engine_count:
          type: ["integer", "null"]
          minimum: 1
          maximum: 4
        horse_power:
          type: ["integer", "null"]
        range_nm:
          type: ["integer", "null"]
        cabins:
          type: ["integer", "null"]
          minimum: 0
        heads:
          type: ["integer", "null"]
          minimum: 0
        berths:
          type: ["integer", "null"]
          minimum: 0
        crew:
          type: ["integer", "null"]
          minimum: 0
    Comparable:
      type: object
      required: [price]
      properties:
        builder:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        length:
          type: ["string", "null"]
        condition:
          type: ["string", "null"]
        price:
          type: string
        note:
          type: ["string", "null"]
    Valuation:
      type: object
      required:
        - estimated_price_eur
        - distressed_price_eur
        - quick_sale_price_eur
        - range_low_eur
        - range_high_eur
        - confidence
        - reasoning
        - comparables
        - condition_baseline_eur
        - condition_multiplier
        - condition_adjustment_pct
        - completeness_score
        - completeness_filled
        - completeness_total
        - sanity_adjusted
        - currency
        - sale_region_label
        - legal_disclaimer
      properties:
        estimated_price_eur:
          type: number
        distressed_price_eur:
          type: number
        quick_sale_price_eur:
          type: number
        range_low_eur:
          type: number
        range_high_eur:
          type: number
        confidence:
          type: string
          enum: [high, medium, low]
        reasoning:
          type: string
        comparables:
          type: array
          items:
            $ref: "#/components/schemas/Comparable"
        condition_baseline_eur:
          type: number
        condition_multiplier:
          type: number
        condition_adjustment_pct:
          type: integer
        condition_label:
          type: ["string", "null"]
        completeness_score:
          type: integer
        completeness_filled:
          type: integer
        completeness_total:
          type: integer
        completeness_missing_critical:
          type: array
          items:
            type: string
        sanity_adjusted:
          type: boolean
        sanity_band_label:
          type: ["string", "null"]
        sanity_per_meter_eur:
          type: ["number", "null"]
        sale_region_label:
          type: string
        vat_status:
          oneOf:
            - $ref: "#/components/schemas/VatStatus"
            - type: "null"
        currency:
          type: string
        legal_disclaimer:
          type: string
          description: Server-injected legal disclaimer; render verbatim on every result surface.
        id:
          type: ["string", "null"]
          description: Estimate id when persisted to history (authenticated requests only).
    EstimateListItem:
      type: object
      required: [id, created_at, estimated_price_eur, currency]
      properties:
        id:
          type: string
        created_at:
          type: string
        yacht_id:
          type: ["string", "null"]
        yacht_label:
          type: ["string", "null"]
        yacht_type:
          type: ["string", "null"]
        length_meters:
          type: ["number", "null"]
        estimated_price_eur:
          type: number
        currency:
          type: string
    EstimateListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EstimateListItem"
    EstimateDetail:
      type: object
      required: [id, created_at, request, result]
      properties:
        id:
          type: string
        created_at:
          type: string
        request:
          $ref: "#/components/schemas/ValuationInput"
        result:
          $ref: "#/components/schemas/Valuation"
    FinancingType:
      type: string
      enum: [cash, loan]
    CharterRegion:
      type: string
      enum:
        - mediterranean
        - caribbean
        - northern_europe
        - asia_pacific_me
        - middle_east
    CharterSeason:
      type: string
      enum: [high, shoulder, low, mixed]
    ManagementStyle:
      type: string
      enum: [owner_operated, management_company, brokerage]
    OccupancyTarget:
      type: string
      enum: [conservative, realistic, optimistic]
    PricingMode:
      type: string
      enum: [manual_daily, manual_weekly, ai]
      description: |
        How the charter rate is determined:
        * manual_daily  — user provides daily rate + number of charter days
        * manual_weekly — user provides weekly rate + number of charter weeks
        * ai            — engine asks AI (web-search) for plausible rate + weeks
    CharterType:
      type: string
      enum: [weekly, daily]
      description: |
        AI mode only. Whether the yacht is chartered by the week or by the day.
        Only consulted for regions that model a daily-charter market (e.g.
        Caribbean offers both; Middle East / Dubai is daily-only). Ignored for
        regions without a daily model and for manual pricing modes.
    EquipmentCategory:
      type: string
      enum: [power, water, navigation, safety, comfort, toys, deck, sailing]
    EquipmentItem:
      type: object
      required: [category, equipment_type]
      properties:
        id:
          type: ["string", "null"]
          description: Server-assigned UUID. Omit when sending new items.
        category:
          $ref: "#/components/schemas/EquipmentCategory"
        equipment_type:
          type: string
          description: |
            Stable machine key for this item (e.g. "generator", "watermaker",
            "starlink", "tender", "jetski", "bow_thruster"). One row per
            logical unit — multi-unit types use multiple rows.
        quantity:
          type: ["integer", "null"]
          minimum: 0
        brand:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        serial_number:
          type: ["string", "null"]
        year_installed:
          type: ["integer", "null"]
          minimum: 1900
          maximum: 2100
        power_kw:
          type: ["number", "null"]
          minimum: 0
        power_hp:
          type: ["number", "null"]
          minimum: 0
        hours:
          type: ["number", "null"]
          minimum: 0
        capacity_liters:
          type: ["number", "null"]
          minimum: 0
        capacity_persons:
          type: ["integer", "null"]
          minimum: 0
        panels_count:
          type: ["integer", "null"]
          minimum: 0
        total_watts:
          type: ["number", "null"]
          minimum: 0
        zones_count:
          type: ["integer", "null"]
          minimum: 0
        type_detail:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
    EquipmentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EquipmentItem"
    YachtVatStatus:
      type: string
      enum: [tax_paid_eu, tax_not_paid, unknown]
    YachtOwnerRole:
      type: string
      enum: [owner, broker, manager]
    YachtInput:
      type: object
      properties:
        name:
          type: ["string", "null"]
        brand:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        year_built:
          type: ["integer", "null"]
          minimum: 1900
          maximum: 2100
        yacht_type:
          oneOf:
            - $ref: "#/components/schemas/YachtType"
            - type: "null"
        configuration:
          type: ["string", "null"]
        length_meters:
          type: ["number", "null"]
          minimum: 1
          maximum: 200
        beam_meters:
          type: ["number", "null"]
        cabins:
          type: ["integer", "null"]
          minimum: 0
        guests:
          type: ["integer", "null"]
          minimum: 0
        crew:
          type: ["integer", "null"]
          minimum: 0
        engine_hours:
          type: ["integer", "null"]
          minimum: 0
        marina_location:
          type: ["string", "null"]
        flag:
          type: ["string", "null"]
        home_port:
          type: ["string", "null"]
        photo_url:
          type: ["string", "null"]
        photo_urls:
          type: array
          items:
            type: string
          default: []
          maxItems: 10
        cover_photo_url:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        commercial_registration:
          type: ["boolean", "null"]
        purchase_price_eur:
          type: ["number", "null"]
          minimum: 0
        purchase_year:
          type: ["integer", "null"]
          minimum: 1900
          maximum: 2100
        financing_type:
          oneOf:
            - $ref: "#/components/schemas/FinancingType"
            - type: "null"
        loan_amount_eur:
          type: ["number", "null"]
          minimum: 0
        loan_rate_pct:
          type: ["number", "null"]
          minimum: 0
        loan_term_years:
          type: ["integer", "null"]
          minimum: 0
        # ── Monthly operating expenses (EUR / month) ─────────────────
        monthly_crew_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_mooring_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_fuel_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_provisioning_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_communications_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_maintenance_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_management_fee_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_misc_eur:
          type: ["number", "null"]
          minimum: 0
        # ── Annual fixed expenses (EUR / year) ───────────────────────
        annual_insurance_eur:
          type: ["number", "null"]
          minimum: 0
        annual_registration_eur:
          type: ["number", "null"]
          minimum: 0
        annual_classification_eur:
          type: ["number", "null"]
          minimum: 0
        annual_antifouling_eur:
          type: ["number", "null"]
          minimum: 0
        annual_refit_reserve_eur:
          type: ["number", "null"]
          minimum: 0
        # ── Charter-specific ────────────────────────────────────────
        charter_commission_pct:
          type: ["number", "null"]
          minimum: 0
          maximum: 100
        # ── Crew breakdown by role (optional, richer than monthly_crew_eur)
        # monthly_crew_eur should equal sum(monthly_salary_eur * months_per_year / 12)
        # so the ROI engine (which still reads monthly_crew_eur) stays consistent.
        crew_breakdown:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/CrewMember"
        # — Migration 011 (My Yacht profile foundation) —
        draft_meters:
          type: ["number", "null"]
          minimum: 0
        registration_number:
          type: ["string", "null"]
        imo_number:
          type: ["string", "null"]
        hull_id:
          type: ["string", "null"]
        vat_status:
          oneOf:
            - $ref: "#/components/schemas/YachtVatStatus"
            - type: "null"
        engine_maker:
          type: ["string", "null"]
        engine_model:
          type: ["string", "null"]
        engine_count:
          type: ["integer", "null"]
          minimum: 0
        total_hp:
          type: ["integer", "null"]
          minimum: 0
        crew_cabins:
          type: ["integer", "null"]
          minimum: 0
        berths:
          type: ["integer", "null"]
          minimum: 0
        heads:
          type: ["integer", "null"]
          minimum: 0
        owner_role:
          oneOf:
            - $ref: "#/components/schemas/YachtOwnerRole"
            - type: "null"
        is_archived:
          type: ["boolean", "null"]
    CrewMember:
      type: object
      required: [role, monthly_salary_eur, months_per_year]
      properties:
        role:
          type: string
          description: Free-text role label (e.g. "Captain", "Chef")
        monthly_salary_eur:
          type: number
          minimum: 0
          description: Salary PER PERSON. Multiply by count for the row total.
        months_per_year:
          type: integer
          minimum: 1
          maximum: 12
        count:
          type: integer
          minimum: 1
          maximum: 50
          default: 1
          description: >-
            Number of crew in this role (e.g. 3 deckhands). Optional; absent
            means 1. Row monthly cost = count * monthly_salary_eur *
            months_per_year / 12, summed into monthly_crew_eur.
    Yacht:
      type: object
      required: [id, clerk_user_id, created_at, updated_at]
      properties:
        id:
          type: string
        clerk_user_id:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        name:
          type: ["string", "null"]
        brand:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        year_built:
          type: ["integer", "null"]
        yacht_type:
          type: ["string", "null"]
        configuration:
          type: ["string", "null"]
        length_meters:
          type: ["number", "null"]
        beam_meters:
          type: ["number", "null"]
        cabins:
          type: ["integer", "null"]
        guests:
          type: ["integer", "null"]
        crew:
          type: ["integer", "null"]
        engine_hours:
          type: ["integer", "null"]
        marina_location:
          type: ["string", "null"]
        flag:
          type: ["string", "null"]
        home_port:
          type: ["string", "null"]
        photo_url:
          type: ["string", "null"]
        photo_urls:
          type: array
          items:
            type: string
          maxItems: 10
        cover_photo_url:
