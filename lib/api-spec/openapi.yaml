    YachtListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Yacht"
    RoiYachtSnapshot:
      type: object
      description: >-
        Passport-only snapshot of a yacht for an ROI calculation that is NOT
        backed by a saved My-Yacht profile (manual entry). Carries identity and
        dimensions only — purchase price, crew, expenses and financing are
        supplied separately via `overrides`. A manual ROI yacht is persisted ONLY
        in ROI history (roi_calculations.yacht_snapshot) and never creates a row
        in the yachts table.
      properties:
        name:
          type: ["string", "null"]
        brand:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        year_built:
          type: ["integer", "null"]
        yacht_type:
          type: ["string", "null"]
        length_meters:
          type: ["number", "null"]
        beam_meters:
          type: ["number", "null"]
        cabins:
          type: ["integer", "null"]
        guests:
          type: ["integer", "null"]
        crew:
          type: ["integer", "null"]
        engine_hours:
          type: ["integer", "null"]
        marina_location:
          type: ["string", "null"]
        flag:
          type: ["string", "null"]
        commercial_registration:
          type: ["boolean", "null"]
    RoiCalculationInput:
      type: object
      required: [region, pricing_mode]
      properties:
        yacht_id:
          type: ["string", "null"]
          description: >-
            ID of a saved My-Yacht profile to pull passport/dimensions from.
            Provide EITHER yacht_id OR yacht_snapshot. My-Yacht profiles are
            read-only here; ROI never writes back to them.
        yacht_snapshot:
          oneOf:
            - $ref: "#/components/schemas/RoiYachtSnapshot"
            - type: "null"
          description: >-
            Passport snapshot for a manually-entered yacht (no saved profile).
            Provide EITHER yacht_id OR yacht_snapshot. Persisted only in ROI
            history; never creates a yachts row.
        region:
          $ref: "#/components/schemas/CharterRegion"
        occupancy_target:
          oneOf:
            - $ref: "#/components/schemas/OccupancyTarget"
            - type: "null"
          description: Hint for AI mode; ignored in manual modes
        pricing_mode:
          $ref: "#/components/schemas/PricingMode"
        manual_rate_eur:
          type: ["number", "null"]
          minimum: 0
          description: Per-day rate for manual_daily, per-week rate for manual_weekly
        manual_charter_units:
          type: ["integer", "null"]
          minimum: 0
          maximum: 366
          description: Number of charter days OR weeks per year, matching pricing_mode
        management_fee_pct:
          type: ["number", "null"]
          minimum: 0
          maximum: 50
          description: >-
            Optional management-fee percentage override. null = use the owner's
            manual monthly management fee on the yacht, or none if unset.
        target_weeks:
          type: ["integer", "null"]
          minimum: 0
          maximum: 52
          description: AI mode only — override AI-predicted charter weeks
        charter_type:
          oneOf:
            - $ref: "#/components/schemas/CharterType"
            - type: "null"
          description: >-
            AI mode only. weekly | daily. Only consulted for regions with a
            daily-charter model (Caribbean = both, Middle East = daily-only);
            ignored elsewhere and for manual modes. Defaults to the region's
            primary basis when null.
        region_2:
          oneOf:
            - $ref: "#/components/schemas/CharterRegion"
            - type: "null"
          description: >-
            AI mode only. Optional SECOND charter region for a dual-region
            scenario (e.g. Mediterranean summer + Caribbean winter). When set
            (and pricing_mode=ai), charter income is computed for BOTH regions
            and summed. null = single-region, which is byte-identical to the
            previous behaviour. Manual modes ignore this field. Max 2 regions.
        season_2:
          oneOf:
            - $ref: "#/components/schemas/CharterSeason"
            - type: "null"
          description: >-
            AI dual-region only. Season basis for region_2 (high | shoulder |
            low | mixed). "mixed" = the region's full charter window. Ignored
            unless region_2 is set. Region 1 always uses its full window.
        charter_type_2:
          oneOf:
            - $ref: "#/components/schemas/CharterType"
            - type: "null"
          description: >-
            AI dual-region only. Charter basis (weekly | daily) for region_2.
            Forced to daily for daily-only regions (e.g. Middle East). Defaults
            to the region's primary basis when null. Ignored unless region_2 set.
        occupancy_target_2:
          oneOf:
            - $ref: "#/components/schemas/OccupancyTarget"
            - type: "null"
          description: >-
            AI dual-region only. Occupancy posture for region_2. Defaults to
            realistic. Ignored unless region_2 is set.
        repositioning_cost_eur:
          type: ["number", "null"]
          minimum: 0
          description: >-
            AI dual-region only. Annual cost of repositioning the yacht between
            the two regions (both ways combined). Added as a single expense
            line. Ignored when region_2 is null.
        overrides:
          oneOf:
            - $ref: "#/components/schemas/RoiExpenseOverrides"
            - type: "null"
          description: >-
            Per-calculation crew/expense/financing overrides. Applied on top of
            the saved yacht for THIS calculation only and never written back to
            the yacht profile. A null field falls back to the saved yacht value;
            if that is also empty the engine omits the line (maintenance,
            management fee and broker commission always use a default). Choosing
            financing_type "cash" clears any inherited loan figures for the calc.
    RoiExpenseOverrides:
      type: object
      description: >-
        Optional overrides for the ROI calculation. crew_breakdown is stored for
        history/re-open; the engine uses monthly_crew_eur as the crew total.
      properties:
        crew_breakdown:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/CrewMember"
        purchase_price_eur:
          type: ["number", "null"]
          minimum: 0
          description: >-
            Yacht purchase price for THIS calculation (capital base for ROI /
            payback / depreciation). Lives only in ROI — entered on the scenario
            screen, prefilled from a saved yacht when present, never written back.
        monthly_crew_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_mooring_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_fuel_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_provisioning_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_communications_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_maintenance_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_management_fee_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_misc_eur:
          type: ["number", "null"]
          minimum: 0
        annual_insurance_eur:
          type: ["number", "null"]
          minimum: 0
        annual_registration_eur:
          type: ["number", "null"]
          minimum: 0
        annual_classification_eur:
          type: ["number", "null"]
          minimum: 0
        annual_antifouling_eur:
          type: ["number", "null"]
          minimum: 0
        engine_service_eur:
          type: ["number", "null"]
          minimum: 0
          description: Main engine(s) annual service.
        generator_service_eur:
          type: ["number", "null"]
          minimum: 0
          description: Generator(s) annual service.
        annual_refit_reserve_eur:
          type: ["number", "null"]
          minimum: 0
        charter_commission_pct:
          type: ["number", "null"]
          minimum: 0
          maximum: 100
        financing_type:
          oneOf:
            - $ref: "#/components/schemas/FinancingType"
            - type: "null"
        loan_amount_eur:
          type: ["number", "null"]
          minimum: 0
        loan_rate_pct:
          type: ["number", "null"]
          minimum: 0
        loan_term_years:
          type: ["integer", "null"]
          minimum: 0
    RoiComparable:
      type: object
      required: [name]
      properties:
        name:
          type: string
        model:
          type: ["string", "null"]
        year_built:
          type: ["integer", "null"]
        location:
          type: ["string", "null"]
        weekly_rate_eur:
          type: ["number", "null"]
