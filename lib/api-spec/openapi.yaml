    RoiCalculation:
      type: object
      required:
        - annual_revenue_eur
        - annual_expenses_eur
        - net_profit_eur
        - roi_pct
        - payback_years
        - occupancy_pct
        - expected_charter_weeks
        - avg_daily_rate_eur
        - currency
        - expenses
        - revenue_by_month
        - depreciation_curve
        - roi_projection_5y
        - reasoning
        - confidence
        - legal_disclaimer
      properties:
        id:
          type: ["string", "null"]
        annual_revenue_eur:
          type: number
        annual_expenses_eur:
          type: number
        net_profit_eur:
          type: number
        roi_pct:
          type: number
        payback_years:
          type: number
        occupancy_pct:
          type: number
        expected_charter_weeks:
          type: integer
        avg_daily_rate_eur:
          type: number
        daily_rate_low_season_eur:
          type: ["number", "null"]
        daily_rate_high_season_eur:
          type: ["number", "null"]
        market_rating:
          type: ["string", "null"]
          enum: [A, B, C, D, null]
        risk_score:
          type: ["integer", "null"]
          minimum: 1
          maximum: 10
        currency:
          type: string
        expenses:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseBreakdown"
        revenue_by_month:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyPoint"
        depreciation_curve:
          type: array
          items:
            $ref: "#/components/schemas/YearlyPoint"
        roi_projection_5y:
          type: array
          items:
            $ref: "#/components/schemas/YearlyPoint"
        comparables:
          type: array
          items:
            $ref: "#/components/schemas/RoiComparable"
        reasoning:
          type: string
        methodology:
          type: string
          description: >-
            System-generated, human-readable explanation of the exact algorithm
            used for this calculation (charter-income model, expense handling,
            ROI/payback formulas). Optional for backward compatibility with
            calculations saved before this field existed.
        recommendations:
          type: array
          items:
            type: string
        dual_region:
          oneOf:
            - $ref: "#/components/schemas/RoiDualRegionBreakdown"
            - type: "null"
          description: >-
            Present only for dual-region AI scenarios. Per-region charter income
            breakdown plus the repositioning cost. null/absent for single-region
            calculations. annual_revenue_eur already equals the combined total.
        exit_scenario:
          oneOf:
            - $ref: "#/components/schemas/RoiExitScenario"
            - type: "null"
          description: >-
            Sale-after-5-years exit projection for the single scenario that was
            calculated. Built from already-computed 5-year values (cumulative net
            charter income + year-5 depreciated vessel value). Present ONLY when a
            purchase price was entered; null/absent otherwise.
        confidence:
          type: string
          enum: [high, medium, low]
        legal_disclaimer:
          type: string
    RoiExitScenario:
      type: object
      required:
        - purchase_price_eur
        - charter_income_5y_eur
        - vessel_value_at_sale_eur
        - total_return_eur
        - exit_result_eur
        - exit_result_pct
      properties:
        purchase_price_eur:
          type: number
          description: Total invested (the entered purchase price).
        charter_income_5y_eur:
          type: number
          description: Cumulative net charter income over 5 years (already calculated).
        vessel_value_at_sale_eur:
          type: number
          description: Year-5 depreciated vessel value (already calculated).
        total_return_eur:
          type: number
          description: charter_income_5y_eur + vessel_value_at_sale_eur.
        exit_result_eur:
          type: number
          description: total_return_eur − purchase_price_eur.
        exit_result_pct:
          type: number
          description: (exit_result_eur / purchase_price_eur) × 100.
        total_loan_paid_eur:
          type: ["number", "null"]
          description: >-
            Annual loan payment × 5 (monthly × 60). Present only when the
            calculation is loan-financed; null otherwise.
        exit_result_after_loan_eur:
          type: ["number", "null"]
          description: >-
            exit_result_eur − total_loan_paid_eur. Present only when loan-financed;
            null otherwise.
    RoiRegionIncome:
      type: object
      required:
        - region
        - charter_type
        - income_eur
        - expected_charter_weeks
        - occupancy_pct
        - avg_daily_rate_eur
        - weekly_rate_eur
      properties:
        region:
          $ref: "#/components/schemas/CharterRegion"
        season:
          oneOf:
            - $ref: "#/components/schemas/CharterSeason"
            - type: "null"
        charter_type:
          type: string
          enum: [weekly, daily]
          description: Effective charter basis used for this region.
        income_eur:
          type: number
          description: Annual gross charter income for this region alone.
        expected_charter_weeks:
          type: number
        expected_charter_days:
          type: ["number", "null"]
          description: Present (weeks×7) when charter_type=daily, else null.
        occupancy_pct:
          type: number
        avg_daily_rate_eur:
          type: number
        weekly_rate_eur:
          type: number
    RoiDualRegionBreakdown:
      type: object
      required:
        - region_1
        - region_2
        - total_gross_income_eur
        - repositioning_cost_eur
        - net_charter_income_eur
      properties:
        region_1:
          $ref: "#/components/schemas/RoiRegionIncome"
        region_2:
          $ref: "#/components/schemas/RoiRegionIncome"
        total_gross_income_eur:
          type: number
          description: region_1.income_eur + region_2.income_eur.
        repositioning_cost_eur:
          type: number
        net_charter_income_eur:
          type: number
          description: >-
            total_gross_income_eur − repositioning_cost_eur (charter income net
            of repositioning, before other operating expenses).
