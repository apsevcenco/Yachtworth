openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: valuations
    description: Yacht market estimate operations
  - name: estimates
    description: Saved estimate history (authenticated)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /valuations:
    post:
      operationId: createValuation
      tags: [valuations]
      summary: Create AI yacht market estimate
      description: |
        Estimates fair market value of a yacht using AI comparable search
        plus deterministic sanity check + condition multiplier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValuationInput"
      responses:
        "200":
          description: Market estimate produced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Valuation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Estimation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /estimates:
    get:
      operationId: listEstimates
      tags: [estimates]
      summary: List user's saved estimates
      description: Returns last 50 estimates for the authenticated user, newest first.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Estimate list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /estimates/{id}:
    get:
      operationId: getEstimate
      tags: [estimates]
      summary: Get a saved estimate by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estimate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateDetail"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    YachtType:
      type: string
      enum:
        - motor_yacht
        - sailing_yacht
        - catamaran
        - superyacht
    YachtCondition:
      type: string
      enum:
        - New
        - Excellent
        - Good
        - Fair
        - Needs Refit
        - Project
    ValuationMode:
      type: string
      enum: [builder, specs]
    SaleRegion:
      type: string
      enum:
        - mediterranean
        - northern_europe
        - north_america_caribbean
        - asia_pacific_me
        - global
    VatStatus:
      type: string
      enum: [paid, not_paid]
    EngineConfig:
      type: string
      enum:
        - single_diesel
        - twin_diesel
        - triple_diesel
        - quad_diesel
        - ips_drives
        - sail_auxiliary
        - electric_hybrid
        - waterjet
    ValuationInput:
      type: object
      required:
        - mode
        - bypass_required
        - type
        - year_built
        - length_meters
        - sale_region
      properties:
        mode:
          $ref: "#/components/schemas/ValuationMode"
        bypass_required:
          type: boolean
          description: When true, only hard requirements are enforced
        type:
          $ref: "#/components/schemas/YachtType"
        configuration:
          type: ["string", "null"]
          description: e.g. "Flybridge", "Sport Yacht", "Sloop"
        builder:
          type: ["string", "null"]
          description: Yacht builder/manufacturer (required when mode=builder unless bypass)
        model:
          type: ["string", "null"]
          description: Model/range (required when mode=builder unless bypass)
        year_built:
          type: integer
          minimum: 1940
          maximum: 2100
        refit_year:
          type: ["integer", "null"]
          minimum: 1940
          maximum: 2100
        condition:
          oneOf:
            - $ref: "#/components/schemas/YachtCondition"
            - type: "null"
          description: Required unless bypass; defaults to Excellent multiplier when missing
        sale_region:
          $ref: "#/components/schemas/SaleRegion"
        vat_status:
          oneOf:
            - $ref: "#/components/schemas/VatStatus"
            - type: "null"
          description: Required when sale_region in [mediterranean, northern_europe, global]
        length_meters:
          type: number
          minimum: 1
          maximum: 200
        beam_meters:
          type: ["number", "null"]
        draft_meters:
          type: ["number", "null"]
        hull_material:
          type: ["string", "null"]
        displacement_tonnes:
          type: ["number", "null"]
        gross_tonnage:
          type: ["number", "null"]
        engine_maker:
          type: ["string", "null"]
        engine_model:
          type: ["string", "null"]
        engine_config:
          oneOf:
            - $ref: "#/components/schemas/EngineConfig"
            - type: "null"
        engine_count:
          type: ["integer", "null"]
          minimum: 1
          maximum: 4
        horse_power:
          type: ["integer", "null"]
        range_nm:
          type: ["integer", "null"]
        cabins:
          type: ["integer", "null"]
          minimum: 0
        heads:
          type: ["integer", "null"]
          minimum: 0
        berths:
          type: ["integer", "null"]
          minimum: 0
        crew:
          type: ["integer", "null"]
          minimum: 0
    Comparable:
      type: object
      required: [price]
      properties:
        builder:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        length:
          type: ["string", "null"]
        condition:
          type: ["string", "null"]
        price:
          type: string
        note:
          type: ["string", "null"]
    Valuation:
      type: object
      required:
        - estimated_price_eur
        - distressed_price_eur
        - quick_sale_price_eur
        - range_low_eur
        - range_high_eur
        - confidence
        - reasoning
        - comparables
        - condition_baseline_eur
        - condition_multiplier
        - condition_adjustment_pct
        - completeness_score
        - completeness_filled
        - completeness_total
        - sanity_adjusted
        - currency
        - sale_region_label
        - legal_disclaimer
      properties:
        estimated_price_eur:
          type: number
        distressed_price_eur:
          type: number
        quick_sale_price_eur:
          type: number
        range_low_eur:
          type: number
        range_high_eur:
          type: number
        confidence:
          type: string
          enum: [high, medium, low]
        reasoning:
          type: string
        comparables:
          type: array
          items:
            $ref: "#/components/schemas/Comparable"
        condition_baseline_eur:
          type: number
        condition_multiplier:
          type: number
        condition_adjustment_pct:
          type: integer
        condition_label:
          type: ["string", "null"]
        completeness_score:
          type: integer
        completeness_filled:
          type: integer
        completeness_total:
          type: integer
        completeness_missing_critical:
          type: array
          items:
            type: string
        sanity_adjusted:
          type: boolean
        sanity_band_label:
          type: ["string", "null"]
        sanity_per_meter_eur:
          type: ["number", "null"]
        sale_region_label:
          type: string
        vat_status:
          oneOf:
            - $ref: "#/components/schemas/VatStatus"
            - type: "null"
        currency:
          type: string
        legal_disclaimer:
          type: string
          description: Server-injected legal disclaimer; render verbatim on every result surface.
        id:
          type: ["string", "null"]
          description: Estimate id when persisted to history (authenticated requests only).
    EstimateListItem:
      type: object
      required: [id, created_at, estimated_price_eur, currency]
      properties:
        id:
          type: string
        created_at:
          type: string
        yacht_label:
          type: ["string", "null"]
        yacht_type:
          type: ["string", "null"]
        length_meters:
          type: ["number", "null"]
        estimated_price_eur:
          type: number
        currency:
          type: string
    EstimateListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EstimateListItem"
    EstimateDetail:
      type: object
      required: [id, created_at, request, result]
      properties:
        id:
          type: string
        created_at:
          type: string
        request:
          $ref: "#/components/schemas/ValuationInput"
        result:
          $ref: "#/components/schemas/Valuation"
