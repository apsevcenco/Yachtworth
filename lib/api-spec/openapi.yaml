openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: valuations
    description: Yacht market estimate operations
  - name: estimates
    description: Saved estimate history (authenticated)
  - name: yachts
    description: User-owned yacht profiles (authenticated)
  - name: roi
    description: Charter ROI intelligence (authenticated)
  - name: cost
    description: Annual ownership cost estimator (separate module)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /valuations:
    post:
      operationId: createValuation
      tags: [valuations]
      summary: Create AI yacht market estimate
      description: |
        Estimates fair market value of a yacht using AI comparable search
        plus deterministic sanity check + condition multiplier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValuationInput"
      responses:
        "200":
          description: Market estimate produced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Valuation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Estimation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /estimates:
    get:
      operationId: listEstimates
      tags: [estimates]
      summary: List user's saved estimates
      description: Returns last 50 estimates for the authenticated user, newest first.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Estimate list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /estimates/{id}:
    get:
      operationId: getEstimate
      tags: [estimates]
      summary: Get a saved estimate by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estimate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateDetail"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteEstimate
      tags: [estimates]
      summary: Delete a saved estimate
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /yachts:
    get:
      operationId: listYachts
      tags: [yachts]
      summary: List user's yacht profiles
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: include_archived
          required: false
          schema:
            type: boolean
          description: Include archived yachts in the result
      responses:
        "200":
          description: Yacht list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YachtListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createYacht
      tags: [yachts]
      summary: Create a yacht profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YachtInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yacht"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /yachts/{id}:
    get:
      operationId: getYacht
      tags: [yachts]
      summary: Get a yacht profile by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Yacht detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yacht"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateYacht
      tags: [yachts]
      summary: Update a yacht profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YachtInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yacht"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteYacht
      tags: [yachts]
      summary: Delete a yacht profile (cascades ROI calculations)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /yachts/{id}/equipment:
    get:
      operationId: listYachtEquipment
      tags: [yachts]
      summary: List equipment items for a yacht
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Equipment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentList"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Yacht not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: replaceYachtEquipment
      tags: [yachts]
      summary: Replace all equipment rows for a yacht (delete-then-insert)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentList"
      responses:
        "200":
          description: Equipment after replace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentList"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Yacht not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roi/calculate:
    post:
      operationId: calculateRoi
      tags: [roi]
      summary: Compute charter ROI for a yacht
      description: |
        Runs the Charter ROI engine for the user's yacht. Pricing is set by
        `pricing_mode` — manual_daily / manual_weekly require `manual_rate_eur`
        and `manual_charter_units`; ai mode estimates rate via web search and
        falls back to a deterministic regional heuristic if the AI call fails.
        Result is persisted to roi_calculations.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoiCalculationInput"
      responses:
        "200":
          description: ROI computed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoiCalculation"
        "400":
          description: Invalid input (bad shape, manual rate/units out of range)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Yacht not found or not owned by caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Engine failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: ROI storage not configured (Supabase missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roi/ai-rate-estimate:
    post:
      operationId: aiRateEstimate
      tags: [roi]
      summary: AI-driven charter rate lookup for a yacht
      description: |
        Researches current charter market rates via OpenAI gpt-5-mini with the
        web_search_preview tool, falls back to /chat/completions, and returns
        a structured estimate (rate, range, seasonal breakdown, sources,
        confidence). Never throws on AI failure — returns success=false with
        a user-facing error string instead.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiRateEstimateRequest"
      responses:
        "200":
          description: Estimate returned (may be success=false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRateEstimateResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Yacht not found or not owned by caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Storage not configured (Supabase missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roi/calculations:
    get:
      operationId: listRoiCalculations
      tags: [roi]
      summary: List user's saved ROI calculations
      security:
        - bearerAuth: []
      parameters:
        - name: yacht_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: ROI list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoiCalculationListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cost-estimates:
    post:
      operationId: calculateCostEstimate
      tags: [cost]
      summary: Compute (and optionally save) annual ownership cost
      description: |
        Pure deterministic calculator. If the caller is authenticated, the
        estimate is also persisted to history; guests still get the result.
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CostEstimateInput"
      responses:
        "200":
          description: Estimate computed (saved if authenticated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimate"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listCostEstimates
      tags: [cost]
      summary: List user's saved annual cost estimates
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved estimate list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimateListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cost-estimates/{id}:
    get:
      operationId: getCostEstimate
      tags: [cost]
      summary: Get a saved annual cost estimate by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estimate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimateDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCostEstimate
      tags: [cost]
      summary: Delete a saved annual cost estimate
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roi/calculations/{id}:
    get:
      operationId: getRoiCalculation
      tags: [roi]
      summary: Get a saved ROI calculation by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ROI detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoiCalculationDetail"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRoiCalculation
      tags: [roi]
      summary: Delete a saved ROI calculation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /charters:
    get:
      operationId: listCharters
      tags: [charters]
      summary: List charters (optionally filtered by yacht and date range)
      security:
        - bearerAuth: []
      parameters:
        - name: yacht_id
          in: query
          required: false
          schema:
            type: string
        - name: start
          in: query
          required: false
          description: ISO date — only charters whose end_date >= this
          schema:
            type: string
        - name: end
          in: query
          required: false
          description: ISO date — only charters whose start_date <= this
          schema:
            type: string
      responses:
        "200":
          description: Charter list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharterListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCharter
      tags: [charters]
      summary: Create a charter booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charter"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /charters/{id}:
    get:
      operationId: getCharter
      tags: [charters]
      summary: Get a charter by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Charter detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charter"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCharter
      tags: [charters]
      summary: Update a charter
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharterInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charter"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCharter
      tags: [charters]
      summary: Delete a charter
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients with aggregate charter stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Client list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client with their charters
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    YachtType:
      type: string
      enum:
        - motor_yacht
        - sailing_yacht
        - catamaran
        - superyacht
    YachtCondition:
      type: string
      enum:
        - New
        - Excellent
        - Good
        - Fair
        - Needs Refit
        - Project
    ValuationMode:
      type: string
      enum: [builder, specs]
    SaleRegion:
      type: string
      enum:
        - mediterranean
        - northern_europe
        - north_america_caribbean
        - asia_pacific_me
        - global
    VatStatus:
      type: string
      enum: [paid, not_paid]
    EngineConfig:
      type: string
      enum:
        - single_diesel
        - twin_diesel
        - triple_diesel
        - quad_diesel
        - ips_drives
        - sail_auxiliary
        - electric_hybrid
        - waterjet
    ValuationInput:
      type: object
      required:
        - mode
        - bypass_required
        - type
        - year_built
        - length_meters
        - sale_region
      properties:
        mode:
          $ref: "#/components/schemas/ValuationMode"
        bypass_required:
          type: boolean
          description: When true, only hard requirements are enforced
        type:
          $ref: "#/components/schemas/YachtType"
        configuration:
          type: ["string", "null"]
          description: e.g. "Flybridge", "Sport Yacht", "Sloop"
        builder:
          type: ["string", "null"]
          description: Yacht builder/manufacturer (required when mode=builder unless bypass)
        model:
          type: ["string", "null"]
          description: Model/range (required when mode=builder unless bypass)
        year_built:
          type: integer
          minimum: 1940
          maximum: 2100
        refit_year:
          type: ["integer", "null"]
          minimum: 1940
          maximum: 2100
        condition:
          oneOf:
            - $ref: "#/components/schemas/YachtCondition"
            - type: "null"
          description: Required unless bypass; defaults to Excellent multiplier when missing
        sale_region:
          $ref: "#/components/schemas/SaleRegion"
        vat_status:
          oneOf:
            - $ref: "#/components/schemas/VatStatus"
            - type: "null"
          description: Required when sale_region in [mediterranean, northern_europe, global]
        length_meters:
          type: number
          minimum: 1
          maximum: 200
        beam_meters:
          type: ["number", "null"]
        draft_meters:
          type: ["number", "null"]
        hull_material:
          type: ["string", "null"]
        displacement_tonnes:
          type: ["number", "null"]
        gross_tonnage:
          type: ["number", "null"]
        engine_maker:
          type: ["string", "null"]
        engine_model:
          type: ["string", "null"]
        engine_config:
          oneOf:
            - $ref: "#/components/schemas/EngineConfig"
            - type: "null"
        engine_count:
          type: ["integer", "null"]
          minimum: 1
          maximum: 4
        horse_power:
          type: ["integer", "null"]
        range_nm:
          type: ["integer", "null"]
        cabins:
          type: ["integer", "null"]
          minimum: 0
        heads:
          type: ["integer", "null"]
          minimum: 0
        berths:
          type: ["integer", "null"]
          minimum: 0
        crew:
