openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: valuations
    description: Yacht market estimate operations
  - name: estimates
    description: Saved estimate history (authenticated)
  - name: yachts
    description: User-owned yacht profiles (authenticated)
  - name: roi
    description: Charter ROI intelligence (authenticated)
  - name: cost
    description: Annual ownership cost estimator (separate module)
  - name: listings
    description: AI-powered yacht listing copy generation (Claude)
  - name: proposals
    description: Yacht proposal document builder (PDF spec sheets)
  - name: surveys
    description: Professional marine survey report builder (26 sections, PDF)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /valuations:
    post:
      operationId: createValuation
      tags: [valuations]
      summary: Create AI yacht market estimate
      description: |
        Estimates fair market value of a yacht using AI comparable search
        plus deterministic sanity check + condition multiplier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValuationInput"
      responses:
        "200":
          description: Market estimate produced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Valuation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Estimation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /estimates:
    get:
      operationId: listEstimates
      tags: [estimates]
      summary: List user's saved estimates
      description: Returns last 50 estimates for the authenticated user, newest first.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: yacht_id
          required: false
          schema:
            type: string
          description: When provided, only estimates linked to this yacht profile are returned.
      responses:
        "200":
          description: Estimate list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /estimates/{id}:
    get:
      operationId: getEstimate
      tags: [estimates]
      summary: Get a saved estimate by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estimate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateDetail"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteEstimate
      tags: [estimates]
      summary: Delete a saved estimate
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /yachts:
    get:
      operationId: listYachts
      tags: [yachts]
      summary: List user's yacht profiles
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: include_archived
          required: false
          schema:
            type: boolean
          description: Include archived yachts in the result
      responses:
        "200":
          description: Yacht list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YachtListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createYacht
      tags: [yachts]
      summary: Create a yacht profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YachtInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yacht"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /yachts/{id}:
    get:
      operationId: getYacht
      tags: [yachts]
      summary: Get a yacht profile by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Yacht detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yacht"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateYacht
      tags: [yachts]
      summary: Update a yacht profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YachtInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yacht"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteYacht
      tags: [yachts]
      summary: Delete a yacht profile (cascades ROI calculations)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /yachts/{id}/equipment:
    get:
      operationId: listYachtEquipment
      tags: [yachts]
      summary: List equipment items for a yacht
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Equipment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentList"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Yacht not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: replaceYachtEquipment
      tags: [yachts]
      summary: Replace all equipment rows for a yacht (delete-then-insert)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentList"
      responses:
        "200":
          description: Equipment after replace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentList"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Yacht not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roi/calculate:
    post:
      operationId: calculateRoi
      tags: [roi]
      summary: Compute charter ROI for a yacht
      description: |
        Runs the Charter ROI engine for the user's yacht. Pricing is set by
        `pricing_mode` — manual_daily / manual_weekly require `manual_rate_eur`
        and `manual_charter_units`; ai mode estimates rate via web search and
        falls back to a deterministic regional heuristic if the AI call fails.
        Result is persisted to roi_calculations.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoiCalculationInput"
      responses:
        "200":
          description: ROI computed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoiCalculation"
        "400":
          description: Invalid input (bad shape, manual rate/units out of range)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Yacht not found or not owned by caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Engine failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: ROI storage not configured (Supabase missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roi/ai-rate-estimate:
    post:
      operationId: aiRateEstimate
      tags: [roi]
      summary: AI-driven charter rate lookup for a yacht
      description: |
        Researches current charter market rates via OpenAI gpt-5-mini with the
        web_search_preview tool, falls back to /chat/completions, and returns
        a structured estimate (rate, range, seasonal breakdown, sources,
        confidence). Never throws on AI failure — returns success=false with
        a user-facing error string instead.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiRateEstimateRequest"
      responses:
        "200":
          description: Estimate returned (may be success=false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRateEstimateResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Yacht not found or not owned by caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Storage not configured (Supabase missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roi/calculations:
    get:
      operationId: listRoiCalculations
      tags: [roi]
      summary: List user's saved ROI calculations
      security:
        - bearerAuth: []
      parameters:
        - name: yacht_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: ROI list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoiCalculationListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cost-estimates:
    post:
      operationId: calculateCostEstimate
      tags: [cost]
      summary: Compute (and optionally save) annual ownership cost
      description: |
        Pure deterministic calculator. If the caller is authenticated, the
        estimate is also persisted to history; guests still get the result.
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CostEstimateInput"
      responses:
        "200":
          description: Estimate computed (saved if authenticated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimate"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listCostEstimates
      tags: [cost]
      summary: List user's saved annual cost estimates
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: yacht_id
          required: false
          schema:
            type: string
          description: When provided, only cost estimates linked to this yacht profile are returned.
      responses:
        "200":
          description: Saved estimate list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimateListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cost-estimates/{id}:
    get:
      operationId: getCostEstimate
      tags: [cost]
      summary: Get a saved annual cost estimate by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estimate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimateDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCostEstimate
      tags: [cost]
      summary: Delete a saved annual cost estimate
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roi/calculations/{id}:
    get:
      operationId: getRoiCalculation
      tags: [roi]
      summary: Get a saved ROI calculation by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ROI detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoiCalculationDetail"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRoiCalculation
      tags: [roi]
      summary: Delete a saved ROI calculation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /charters:
    get:
      operationId: listCharters
      tags: [charters]
      summary: List charters (optionally filtered by yacht and date range)
      security:
        - bearerAuth: []
      parameters:
        - name: yacht_id
          in: query
          required: false
          schema:
            type: string
        - name: start
          in: query
          required: false
          description: ISO date — only charters whose end_date >= this
          schema:
            type: string
        - name: end
          in: query
          required: false
          description: ISO date — only charters whose start_date <= this
          schema:
            type: string
      responses:
        "200":
          description: Charter list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharterListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCharter
      tags: [charters]
      summary: Create a charter booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charter"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /charters/{id}:
    get:
      operationId: getCharter
      tags: [charters]
      summary: Get a charter by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Charter detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charter"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCharter
      tags: [charters]
      summary: Update a charter
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharterInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charter"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCharter
      tags: [charters]
      summary: Delete a charter
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients with aggregate charter stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Client list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client with their charters
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /listings/generate:
    post:
      operationId: generateListing
      tags: [listings]
      summary: Generate yacht listing copy with Claude AI
      description: |
        Takes a yacht data snapshot + listing settings and asks Claude
        (claude-sonnet-4-6) to write professional broker listing copy.
        Falls back to a deterministic template if AI fails — never returns 500.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingGenerateRequest"
      responses:
        "200":
          description: Listing generated (may be ai_used=false on fallback)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingGenerateResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /listings:
    get:
      operationId: listListings
      tags: [listings]
      summary: List user's saved listings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: saveListing
      tags: [listings]
      summary: Persist a generated listing to user history
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListingSaveInput"
      responses:
        "201":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Storage not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /listings/{id}:
    get:
      operationId: getListing
      tags: [listings]
      summary: Get a saved listing
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
