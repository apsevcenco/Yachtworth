openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: valuations
    description: Yacht market estimate operations
  - name: estimates
    description: Saved estimate history (authenticated)
  - name: yachts
    description: User-owned yacht profiles (authenticated)
  - name: roi
    description: Charter ROI intelligence (authenticated)
  - name: cost
    description: Annual ownership cost estimator (separate module)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /valuations:
    post:
      operationId: createValuation
      tags: [valuations]
      summary: Create AI yacht market estimate
      description: |
        Estimates fair market value of a yacht using AI comparable search
        plus deterministic sanity check + condition multiplier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValuationInput"
      responses:
        "200":
          description: Market estimate produced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Valuation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Estimation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /estimates:
    get:
      operationId: listEstimates
      tags: [estimates]
      summary: List user's saved estimates
      description: Returns last 50 estimates for the authenticated user, newest first.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Estimate list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /estimates/{id}:
    get:
      operationId: getEstimate
      tags: [estimates]
      summary: Get a saved estimate by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estimate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateDetail"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /yachts:
    get:
      operationId: listYachts
      tags: [yachts]
      summary: List user's yacht profiles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Yacht list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YachtListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createYacht
      tags: [yachts]
      summary: Create a yacht profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YachtInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yacht"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /yachts/{id}:
    get:
      operationId: getYacht
      tags: [yachts]
      summary: Get a yacht profile by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Yacht detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yacht"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateYacht
      tags: [yachts]
      summary: Update a yacht profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YachtInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Yacht"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteYacht
      tags: [yachts]
      summary: Delete a yacht profile (cascades ROI calculations)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roi/calculate:
    post:
      operationId: calculateRoi
      tags: [roi]
      summary: Compute charter ROI for a yacht
      description: |
        Runs the Charter ROI engine for the user's yacht. Pricing is set by
        `pricing_mode` — manual_daily / manual_weekly require `manual_rate_eur`
        and `manual_charter_units`; ai mode estimates rate via web search and
        falls back to a deterministic regional heuristic if the AI call fails.
        Result is persisted to roi_calculations.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoiCalculationInput"
      responses:
        "200":
          description: ROI computed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoiCalculation"
        "400":
          description: Invalid input (bad shape, manual rate/units out of range)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Yacht not found or not owned by caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Engine failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: ROI storage not configured (Supabase missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roi/calculations:
    get:
      operationId: listRoiCalculations
      tags: [roi]
      summary: List user's saved ROI calculations
      security:
        - bearerAuth: []
      parameters:
        - name: yacht_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: ROI list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoiCalculationListResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cost-estimates:
    post:
      operationId: calculateCostEstimate
      tags: [cost]
      summary: Compute (and optionally save) annual ownership cost
      description: |
        Pure deterministic calculator. If the caller is authenticated, the
        estimate is also persisted to history; guests still get the result.
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CostEstimateInput"
      responses:
        "200":
          description: Estimate computed (saved if authenticated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimate"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listCostEstimates
      tags: [cost]
      summary: List user's saved annual cost estimates
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved estimate list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimateListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cost-estimates/{id}:
    get:
      operationId: getCostEstimate
      tags: [cost]
      summary: Get a saved annual cost estimate by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Estimate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimateDetail"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCostEstimate
      tags: [cost]
      summary: Delete a saved annual cost estimate
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /roi/calculations/{id}:
    get:
      operationId: getRoiCalculation
      tags: [roi]
      summary: Get a saved ROI calculation by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ROI detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoiCalculationDetail"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    YachtType:
      type: string
      enum:
        - motor_yacht
        - sailing_yacht
        - catamaran
        - superyacht
    YachtCondition:
      type: string
      enum:
        - New
        - Excellent
        - Good
        - Fair
        - Needs Refit
        - Project
    ValuationMode:
      type: string
      enum: [builder, specs]
    SaleRegion:
      type: string
      enum:
        - mediterranean
        - northern_europe
        - north_america_caribbean
        - asia_pacific_me
        - global
    VatStatus:
      type: string
      enum: [paid, not_paid]
    EngineConfig:
      type: string
      enum:
        - single_diesel
        - twin_diesel
        - triple_diesel
        - quad_diesel
        - ips_drives
        - sail_auxiliary
        - electric_hybrid
        - waterjet
    ValuationInput:
      type: object
      required:
        - mode
        - bypass_required
        - type
        - year_built
        - length_meters
        - sale_region
      properties:
        mode:
          $ref: "#/components/schemas/ValuationMode"
        bypass_required:
          type: boolean
          description: When true, only hard requirements are enforced
        type:
          $ref: "#/components/schemas/YachtType"
        configuration:
          type: ["string", "null"]
          description: e.g. "Flybridge", "Sport Yacht", "Sloop"
        builder:
          type: ["string", "null"]
          description: Yacht builder/manufacturer (required when mode=builder unless bypass)
        model:
          type: ["string", "null"]
          description: Model/range (required when mode=builder unless bypass)
        year_built:
          type: integer
          minimum: 1940
          maximum: 2100
        refit_year:
          type: ["integer", "null"]
          minimum: 1940
          maximum: 2100
        condition:
          oneOf:
            - $ref: "#/components/schemas/YachtCondition"
            - type: "null"
          description: Required unless bypass; defaults to Excellent multiplier when missing
        sale_region:
          $ref: "#/components/schemas/SaleRegion"
        vat_status:
          oneOf:
            - $ref: "#/components/schemas/VatStatus"
            - type: "null"
          description: Required when sale_region in [mediterranean, northern_europe, global]
        length_meters:
          type: number
          minimum: 1
          maximum: 200
        beam_meters:
          type: ["number", "null"]
        draft_meters:
          type: ["number", "null"]
        hull_material:
          type: ["string", "null"]
        displacement_tonnes:
          type: ["number", "null"]
        gross_tonnage:
          type: ["number", "null"]
        engine_maker:
          type: ["string", "null"]
        engine_model:
          type: ["string", "null"]
        engine_config:
          oneOf:
            - $ref: "#/components/schemas/EngineConfig"
            - type: "null"
        engine_count:
          type: ["integer", "null"]
          minimum: 1
          maximum: 4
        horse_power:
          type: ["integer", "null"]
        range_nm:
          type: ["integer", "null"]
        cabins:
          type: ["integer", "null"]
          minimum: 0
        heads:
          type: ["integer", "null"]
          minimum: 0
        berths:
          type: ["integer", "null"]
          minimum: 0
        crew:
          type: ["integer", "null"]
          minimum: 0
    Comparable:
      type: object
      required: [price]
      properties:
        builder:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        length:
          type: ["string", "null"]
        condition:
          type: ["string", "null"]
        price:
          type: string
        note:
          type: ["string", "null"]
    Valuation:
      type: object
      required:
        - estimated_price_eur
        - distressed_price_eur
        - quick_sale_price_eur
        - range_low_eur
        - range_high_eur
        - confidence
        - reasoning
        - comparables
        - condition_baseline_eur
        - condition_multiplier
        - condition_adjustment_pct
        - completeness_score
        - completeness_filled
        - completeness_total
        - sanity_adjusted
        - currency
        - sale_region_label
        - legal_disclaimer
      properties:
        estimated_price_eur:
          type: number
        distressed_price_eur:
          type: number
        quick_sale_price_eur:
          type: number
        range_low_eur:
          type: number
        range_high_eur:
          type: number
        confidence:
          type: string
          enum: [high, medium, low]
        reasoning:
          type: string
        comparables:
          type: array
          items:
            $ref: "#/components/schemas/Comparable"
        condition_baseline_eur:
          type: number
        condition_multiplier:
          type: number
        condition_adjustment_pct:
          type: integer
        condition_label:
          type: ["string", "null"]
        completeness_score:
          type: integer
        completeness_filled:
          type: integer
        completeness_total:
          type: integer
        completeness_missing_critical:
          type: array
          items:
            type: string
        sanity_adjusted:
          type: boolean
        sanity_band_label:
          type: ["string", "null"]
        sanity_per_meter_eur:
          type: ["number", "null"]
        sale_region_label:
          type: string
        vat_status:
          oneOf:
            - $ref: "#/components/schemas/VatStatus"
            - type: "null"
        currency:
          type: string
        legal_disclaimer:
          type: string
          description: Server-injected legal disclaimer; render verbatim on every result surface.
        id:
          type: ["string", "null"]
          description: Estimate id when persisted to history (authenticated requests only).
    EstimateListItem:
      type: object
      required: [id, created_at, estimated_price_eur, currency]
      properties:
        id:
          type: string
        created_at:
          type: string
        yacht_label:
          type: ["string", "null"]
        yacht_type:
          type: ["string", "null"]
        length_meters:
          type: ["number", "null"]
        estimated_price_eur:
          type: number
        currency:
          type: string
    EstimateListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EstimateListItem"
    EstimateDetail:
      type: object
      required: [id, created_at, request, result]
      properties:
        id:
          type: string
        created_at:
          type: string
        request:
          $ref: "#/components/schemas/ValuationInput"
        result:
          $ref: "#/components/schemas/Valuation"
    FinancingType:
      type: string
      enum: [cash, loan]
    CharterRegion:
      type: string
      enum:
        - mediterranean
        - caribbean
        - northern_europe
        - asia_pacific_me
        - middle_east
    CharterSeason:
      type: string
      enum: [high, shoulder, low, mixed]
    ManagementStyle:
      type: string
      enum: [owner_operated, management_company, brokerage]
    OccupancyTarget:
      type: string
      enum: [conservative, realistic, optimistic]
    PricingMode:
      type: string
      enum: [manual_daily, manual_weekly, ai]
      description: |
        How the charter rate is determined:
        * manual_daily  — user provides daily rate + number of charter days
        * manual_weekly — user provides weekly rate + number of charter weeks
        * ai            — engine asks AI (web-search) for plausible rate + weeks
    YachtInput:
      type: object
      properties:
        name:
          type: ["string", "null"]
        brand:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        year_built:
          type: ["integer", "null"]
          minimum: 1900
          maximum: 2100
        yacht_type:
          oneOf:
            - $ref: "#/components/schemas/YachtType"
            - type: "null"
        configuration:
          type: ["string", "null"]
        length_meters:
          type: ["number", "null"]
          minimum: 1
          maximum: 200
        beam_meters:
          type: ["number", "null"]
        cabins:
          type: ["integer", "null"]
          minimum: 0
        guests:
          type: ["integer", "null"]
          minimum: 0
        crew:
          type: ["integer", "null"]
          minimum: 0
        engine_hours:
          type: ["integer", "null"]
          minimum: 0
        marina_location:
          type: ["string", "null"]
        flag:
          type: ["string", "null"]
        commercial_registration:
          type: ["boolean", "null"]
        purchase_price_eur:
          type: ["number", "null"]
          minimum: 0
        purchase_year:
          type: ["integer", "null"]
          minimum: 1900
          maximum: 2100
        financing_type:
          oneOf:
            - $ref: "#/components/schemas/FinancingType"
            - type: "null"
        loan_amount_eur:
          type: ["number", "null"]
          minimum: 0
        loan_rate_pct:
          type: ["number", "null"]
          minimum: 0
        loan_term_years:
          type: ["integer", "null"]
          minimum: 0
        # ── Monthly operating expenses (EUR / month) ─────────────────
        monthly_crew_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_mooring_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_fuel_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_provisioning_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_communications_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_maintenance_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_management_fee_eur:
          type: ["number", "null"]
          minimum: 0
        monthly_misc_eur:
          type: ["number", "null"]
          minimum: 0
        # ── Annual fixed expenses (EUR / year) ───────────────────────
        annual_insurance_eur:
          type: ["number", "null"]
          minimum: 0
        annual_registration_eur:
          type: ["number", "null"]
          minimum: 0
        annual_classification_eur:
          type: ["number", "null"]
          minimum: 0
        annual_antifouling_eur:
          type: ["number", "null"]
          minimum: 0
        annual_refit_reserve_eur:
          type: ["number", "null"]
          minimum: 0
        # ── Charter-specific ────────────────────────────────────────
        charter_commission_pct:
          type: ["number", "null"]
          minimum: 0
          maximum: 100
        # ── Crew breakdown by role (optional, richer than monthly_crew_eur)
        # monthly_crew_eur should equal sum(monthly_salary_eur * months_per_year / 12)
        # so the ROI engine (which still reads monthly_crew_eur) stays consistent.
        crew_breakdown:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/CrewMember"
    CrewMember:
      type: object
      required: [role, monthly_salary_eur, months_per_year]
      properties:
        role:
          type: string
          description: Free-text role label (e.g. "Captain", "Chef")
        monthly_salary_eur:
          type: number
          minimum: 0
        months_per_year:
          type: integer
          minimum: 1
          maximum: 12
    Yacht:
      type: object
      required: [id, clerk_user_id, created_at, updated_at]
      properties:
        id:
          type: string
        clerk_user_id:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        name:
          type: ["string", "null"]
        brand:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        year_built:
          type: ["integer", "null"]
        yacht_type:
          type: ["string", "null"]
        configuration:
          type: ["string", "null"]
        length_meters:
          type: ["number", "null"]
        beam_meters:
          type: ["number", "null"]
        cabins:
          type: ["integer", "null"]
        guests:
          type: ["integer", "null"]
        crew:
          type: ["integer", "null"]
        engine_hours:
          type: ["integer", "null"]
        marina_location:
          type: ["string", "null"]
        flag:
          type: ["string", "null"]
        commercial_registration:
          type: ["boolean", "null"]
        purchase_price_eur:
          type: ["number", "null"]
        purchase_year:
          type: ["integer", "null"]
        financing_type:
          type: ["string", "null"]
        loan_amount_eur:
          type: ["number", "null"]
        loan_rate_pct:
          type: ["number", "null"]
        loan_term_years:
          type: ["integer", "null"]
        monthly_crew_eur:
          type: ["number", "null"]
        monthly_mooring_eur:
          type: ["number", "null"]
