
   name: EAS Update
on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/yachtworth-app/**'
jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install dependencies
        working-directory: artifacts/yachtworth-app
        run: pnpm install --no-frozen-lockfile
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Publish update
        working-directory: artifacts/yachtworth-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch main --message "Update from GitHub Actions" --non-interactive