name: EAS Update

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/yachtworth-app/**'

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: EAS Update
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        working-directory: artifacts/yachtworth-app
        run: eas update --auto