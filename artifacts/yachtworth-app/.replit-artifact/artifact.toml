kind = "mobile"
previewPath = "/"
title = "Yachtworth"
version = "1.0.0"
id = "artifacts/yachtworth-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23690

[services.development]
run = "pnpm --filter @workspace/yachtworth-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yachtworth-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/yachtworth-app", "run", "serve" ]

[services.env]
PORT = "23690"
BASE_PATH = "/"
